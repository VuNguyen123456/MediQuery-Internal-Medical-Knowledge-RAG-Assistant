# k8s/ingress.yaml
#
# WHY INGRESS:
#   In Docker Compose, each service has its own port (3000, 8005, 5000).
#   In production Kubernetes, you want ONE entry point — port 80/443.
#   Ingress is a smart reverse proxy that routes based on URL path:
#
#   localhost/          → frontend-service:3000  (React app)
#   localhost/auth/*    → api-service:8005        (Google OAuth)
#   localhost/api/*     → api-service:8005        (RAG queries)
#   localhost/health    → api-service:8005        (health check)
#
#   This means React talks to /api/query (same origin) instead of
#   localhost:8005/api/query. No CORS issues in production.
#
# REQUIRES: nginx ingress controller
#   Install with: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
#   Or with minikube: minikube addons enable ingress

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mediquery-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: localhost   # change to your domain in production
      http:
        paths:
          # API routes — proxied to Express
          - path: /api(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8005
          # Auth routes — proxied to Express
          - path: /auth(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8005
          # Health check — proxied to Express
          - path: /health
            pathType: Exact
            backend:
              service:
                name: api-service
                port:
                  number: 8005
          # Everything else — React frontend
          - path: /()(.*)
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
