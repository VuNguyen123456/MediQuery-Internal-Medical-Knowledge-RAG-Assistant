# k8s/ingress.yaml
#
# Routes:
#   /api/*              -> Express (RAG proxy + JWT)
#   /auth/login         -> Express (OAuth start)
#   /auth/callback      -> Express (OAuth callback from Google)
#   /auth/logout        -> Express (logout)
#   /auth/me            -> Express (optional user info)
#   /auth/success       -> React (stores JWT from ?token= — NOT Express)
#   /health             -> Express
#   /*                  -> React frontend
#
# Requires: minikube addons enable ingress
# Expose:   minikube tunnel

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mediquery-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "180"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "180"
    # Default nginx limit is 1m — large PDFs (e.g. 300 pages) need more
    nginx.ingress.kubernetes.io/proxy-body-size: "55m"
spec:
  ingressClassName: nginx
  rules:
    - host: localhost
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8005
          - path: /auth/callback
            pathType: Exact
            backend:
              service:
                name: api-service
                port:
                  number: 8005
          - path: /auth/login
            pathType: Exact
            backend:
              service:
                name: api-service
                port:
                  number: 8005
          - path: /auth/logout
            pathType: Exact
            backend:
              service:
                name: api-service
                port:
                  number: 8005
          - path: /auth/me
            pathType: Exact
            backend:
              service:
                name: api-service
                port:
                  number: 8005
          - path: /health
            pathType: Exact
            backend:
              service:
                name: api-service
                port:
                  number: 8005
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
