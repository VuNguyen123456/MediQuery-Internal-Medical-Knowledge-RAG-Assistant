# k8s/api-deployment.yaml
#
# WHY 2 REPLICAS FOR EXPRESS:
#   Express handles auth validation on every request. With 2 replicas,
#   auth + proxy calls are load-balanced. Stateless JWT validation means
#   any replica can handle any request — no sticky sessions needed.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: default
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: mediquery-api:latest
          # imagePullPolicy: Never  ← uncomment for local minikube
          ports:
            - containerPort: 8005
          env:
            # Secrets
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: mediquery-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mediquery-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mediquery-secrets
                  key: JWT_SECRET
            # Config
            - name: EXPRESS_PORT
              valueFrom:
                configMapKeyRef:
                  name: mediquery-config
                  key: EXPRESS_PORT
            - name: EXPRESS_URL
              valueFrom:
                configMapKeyRef:
                  name: mediquery-config
                  key: EXPRESS_URL
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: mediquery-config
                  key: FRONTEND_URL
            - name: FLASK_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: mediquery-config
                  key: FLASK_SERVICE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

---
# Service — internal DNS: http://api-service:8005
# Also used by Ingress to route external traffic to Express
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: default
spec:
  selector:
    app: api
  ports:
    - protocol: TCP
      port: 8005
      targetPort: 8005
  type: ClusterIP
